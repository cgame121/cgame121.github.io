<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>VOIDFALL — Idle Dungeon Crawler</title>
<meta name="description" content="VOIDFALL: เกม idle dungeon crawler มินิมอล ลุยดันเจี้ยนอัตโนมัติ เก็บไอเทม สวมใส่อุปกรณ์ เลเวลอัพ">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2240%22 fill=%22%237C5CFC%22/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app">

  <!-- ============ TOP BAR ============ -->
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark"></span>
      <span class="brand-name">VOIDFALL</span>
    </div>

    <div class="player-summary">
      <div class="level-badge">
        <span class="level-num" id="hudLevel">1</span>
      </div>
      <div class="exp-track">
        <div class="exp-fill" id="hudExpFill"></div>
      </div>
      <div class="gold-pill">
        <span class="gold-icon"></span>
        <span id="hudGold">0</span>
      </div>
    </div>

    <button class="icon-btn" id="settingsBtn" aria-label="ตั้งค่า" title="ตั้งค่า">
      <svg viewBox="0 0 24 24" width="20" height="20"><path d="M12 15.5a3.5 3.5 0 100-7 3.5 3.5 0 000 7z" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M19.4 13a7.6 7.6 0 000-2l1.9-1.5-2-3.4-2.2.9a7.7 7.7 0 00-1.7-1l-.3-2.4H9.9l-.3 2.4a7.7 7.7 0 00-1.7 1l-2.2-.9-2 3.4L5.6 11a7.6 7.6 0 000 2l-1.9 1.5 2 3.4 2.2-.9c.5.4 1.1.7 1.7 1l.3 2.4h4.2l.3-2.4c.6-.3 1.2-.6 1.7-1l2.2.9 2-3.4L19.4 13z" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
    </button>
  </header>

  <!-- ============ MAIN LAYOUT ============ -->
  <main class="main-grid">

    <!-- LEFT: Character & Equipment -->
    <section class="panel char-panel">
      <h2 class="panel-title">ตัวละคร</h2>

      <div class="char-display">
        <div class="char-aura" id="charAura"></div>
        <svg class="char-figure" id="charFigure" viewBox="0 0 120 160">
          <ellipse cx="60" cy="150" rx="30" ry="6" fill="rgba(0,0,0,0.4)"/>
          <g id="charBody">
            <path class="char-cloak" d="M60 30 C30 35, 22 90, 30 140 L90 140 C98 90, 90 35, 60 30 Z"/>
            <circle class="char-head" cx="60" cy="22" r="14"/>
            <path class="char-weapon" id="charWeapon" d="M88 60 L100 30" stroke-width="4" stroke-linecap="round" opacity="0"/>
          </g>
        </svg>
      </div>

      <div class="stat-list">
        <div class="stat-row"><span class="stat-key">พลังชีวิต</span><span class="stat-val" id="statHp">—</span></div>
        <div class="stat-row"><span class="stat-key">พลังโจมตี</span><span class="stat-val" id="statAtk">—</span></div>
        <div class="stat-row"><span class="stat-key">ป้องกัน</span><span class="stat-val" id="statDef">—</span></div>
        <div class="stat-row"><span class="stat-key">คริติคอล</span><span class="stat-val" id="statCrit">—</span></div>
        <div class="stat-row"><span class="stat-key">ความเร็ว</span><span class="stat-val" id="statSpd">—</span></div>
      </div>

      <h3 class="panel-subtitle">อุปกรณ์ที่สวม</h3>
      <div class="equip-slots" id="equipSlots"></div>
    </section>

    <!-- CENTER: Dungeon / Battle stage -->
    <section class="panel stage-panel">

      <div class="dungeon-select" id="dungeonSelectView">
        <h2 class="panel-title">เลือกดันเจี้ยน</h2>
        <p class="hint-text">เลือกดันเจี้ยนเพื่อเริ่มลุยอัตโนมัติ ชนะแล้วจะได้ทองคำ, EXP และไอเทมดรอป</p>
        <div class="dungeon-list" id="dungeonList"></div>
      </div>

      <div class="battle-stage hidden" id="battleStageView">
        <button class="btn-text retreat-btn" id="retreatBtn">← ถอยกลับเมือง</button>

        <div class="stage-header">
          <span class="stage-dungeon-name" id="stageDungeonName">—</span>
          <span class="stage-room-indicator" id="stageRoomIndicator">ห้อง 1/5</span>
        </div>

        <div class="arena">
          <div class="combatant combatant-player">
            <div class="combatant-aura aura-player" id="arenaPlayerAura"></div>
            <svg class="combatant-figure figure-player" id="arenaPlayer" viewBox="0 0 120 160">
              <path class="char-cloak" d="M60 30 C30 35, 22 90, 30 140 L90 140 C98 90, 90 35, 60 30 Z"/>
              <circle class="char-head" cx="60" cy="22" r="14"/>
            </svg>
            <div class="hpbar"><div class="hpbar-fill hpbar-fill-player" id="playerHpFill"></div></div>
            <span class="hpbar-label" id="playerHpLabel">0/0</span>
          </div>

          <div class="vs-mark">VS</div>

          <div class="combatant combatant-monster">
            <div class="combatant-aura aura-monster" id="arenaMonsterAura"></div>
            <svg class="combatant-figure figure-monster" id="arenaMonster" viewBox="0 0 120 160">
              <path class="monster-shape" d="M60 35 C35 40, 28 95, 36 138 L84 138 C92 95, 85 40, 60 35 Z"/>
              <circle class="monster-eye" cx="48" cy="65" r="4"/>
              <circle class="monster-eye" cx="72" cy="65" r="4"/>
            </svg>
            <div class="hpbar"><div class="hpbar-fill hpbar-fill-monster" id="monsterHpFill"></div></div>
            <span class="hpbar-label" id="monsterHpLabel">0/0</span>
            <span class="monster-name" id="monsterNameLabel">—</span>
          </div>

          <div class="fx-layer" id="fxLayer"></div>
        </div>

        <div class="combat-log" id="combatLog"></div>
      </div>

      <div class="result-overlay hidden" id="resultOverlay">
        <div class="result-card">
          <h3 id="resultTitle">ชัยชนะ</h3>
          <p id="resultSubtitle"></p>
          <div class="result-loot" id="resultLoot"></div>
          <button class="btn-primary" id="resultContinueBtn">ดำเนินต่อ</button>
        </div>
      </div>

    </section>

    <!-- RIGHT: Inventory -->
    <section class="panel inv-panel">
      <div class="inv-header">
        <h2 class="panel-title">คลังไอเทม</h2>
        <span class="inv-count" id="invCount">0/60</span>
      </div>
      <div class="inv-actions">
        <button class="btn-small" id="sellJunkBtn">ขายของเก่า (ไม่ล็อก)</button>
      </div>
      <div class="inv-grid" id="invGrid"></div>
    </section>

  </main>

</div>

<!-- ============ ITEM TOOLTIP ============ -->
<div class="tooltip hidden" id="itemTooltip"></div>

<!-- ============ SETTINGS MODAL ============ -->
<div class="modal-backdrop hidden" id="settingsModal">
  <div class="modal-card">
    <h3>ตั้งค่า</h3>
    <button class="btn-secondary full-width" id="exportSaveBtn">คัดลอกข้อมูลเซฟ</button>
    <button class="btn-danger full-width" id="resetSaveBtn">ล้างข้อมูลเซฟทั้งหมด</button>
    <button class="btn-text full-width" id="closeSettingsBtn">ปิด</button>
  </div>
</div>

<!-- ============ TOAST CONTAINER ============ -->
<div class="toast-container" id="toastContainer"></div>

<script src="js/data.js"></script>
<script src="js/items.js"></script>
<script src="js/player.js"></script>
<script src="js/combat.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>
</body>
</html>
